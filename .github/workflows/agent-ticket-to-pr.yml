name: Agent - Ticket to PR

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: agent-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  run-agent:
    if: |
      (github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'agent-ready')) ||
      (github.event.action == 'labeled' && github.event.label.name == 'agent-ready')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log trigger payload
        run: |
          echo "Issue #${{ github.event.issue.number }}"
          echo "Title: ${{ github.event.issue.title }}"
          echo "URL: ${{ github.event.issue.html_url }}"
          echo "Labels: ${{ join(github.event.issue.labels.*.name, ', ') }}"

      - name: Run Claude Code
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          direct_prompt: |
            You are working in repository ${{ github.repository }}.

            Source ticket:
            - GitHub issue #${{ github.event.issue.number }}
            - Title: ${{ github.event.issue.title }}
            - URL: ${{ github.event.issue.html_url }}
            - Body:
              ${{ github.event.issue.body }}

            Required workflow:
            1) Read issue #${{ github.event.issue.number }} and understand the requested maintenance change.
            2) Create branch: agent/issue-${{ github.event.issue.number }}
            3) Implement the smallest safe change to satisfy the issue.
            4) Run relevant project checks/tests and fix failures caused by your change.
            5) Open a PR to main with:
               - clear title and summary
               - testing notes
               - "Closes #${{ github.event.issue.number }}" in PR body

            If the issue is unclear or unsafe, leave a comment on the issue explaining what is missing and stop.
